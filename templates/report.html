{% extends "base.html" %}

{% block content %}
<div class="form-container glass" style="max-width: 700px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Report an Item</h2>
    <form method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" name="item_name" required pattern="[A-Za-z0-9 ]{1,15}"
                    title="Max 15 characters, letters and numbers only" placeholder="e.g. iPhone 13">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category" required>
                    <option value="Electronics">Electronics</option>
                    <option value="Id card">Id card</option>
                    <option value="wallets">wallets</option>
                    <option value="books">books</option>
                    <option value="Other things">Other things</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>Location Where Found/Lost</label>
                <input type="text" name="location" required pattern="[A-Za-z0-9 ]{1,15}"
                    title="Max 15 characters, letters and numbers only" placeholder="e.g. Room 201">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="contact_number" required pattern="[0-9]{10}" title="Exactly 10 digits"
                    placeholder="e.g. 9876543210">
            </div>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="description" name="description" rows="3"
                placeholder="Describe the item (color, brand, unique marks)..."></textarea>
            <small id="word-count" style="color: var(--text-muted); display: block; margin-top: 0.3rem;">0 / 500
                words</small>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Lost">I Lost This</option>
                    <option value="Found">I Found This</option>
                </select>
            </div>
            <div class="form-group">
                <label>Item Photo</label>
                <input type="file" name="image" accept="image/*" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Report</button>
    </form>
</div>
{% endblock %}
